---
- name: Install PostgreSQL
  ansible.builtin.apt:
    name:
      - postgresql
      - postgresql-contrib
      - python3-psycopg2
    state: present
    update_cache: yes

- name: Ensure PostgreSQL is running
  ansible.builtin.service:
    name: postgresql
    state: started
    enabled: yes

- name: Create app database
  community.postgresql.postgresql_db:
    name: "{{ db_name }}"
  become: true
  become_user: postgres

- name: Create app DB user
  community.postgresql.postgresql_user:
    login_db: "{{ db_name }}"
    user: "{{ db_user }}"
    password: "{{ db_password }}"
  become: true
  become_user: postgres

- name: Grant privileges to app DB user
  community.postgresql.postgresql_privs:
    db: "{{ db_name }}"
    role: "{{ db_user }}"
    type: database
    privs: ALL
  become: true
  become_user: postgres

- name: Detect installed PostgreSQL version
  ansible.builtin.command: psql --version
  register: pg_version_output
  changed_when: false

- name: Set postgresql_version fact
  ansible.builtin.set_fact:
    postgresql_version: "{{ pg_version_output.stdout.split()[2].split('.')[0] }}"

- name: Restrict listen_addresses (bind to localhost only if app is co-located)
  ansible.builtin.lineinfile:
    path: /etc/postgresql/{{ postgresql_version }}/main/postgresql.conf
    regexp: '^#?listen_addresses'
    line: "listen_addresses = 'localhost'"
  notify: restart postgresql
